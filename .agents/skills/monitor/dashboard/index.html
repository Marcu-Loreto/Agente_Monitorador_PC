<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Performance Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-color: #f1f5f9;
            --secondary-text: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            font-size: 1.2rem;
            margin-top: 0;
            color: var(--secondary-text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: 600;
            margin: 10px 0;
            color: var(--accent-color);
        }

        .metric-unit {
            font-size: 1rem;
            color: var(--secondary-text);
        }

        .chart-container {
            height: 150px;
            margin-top: 20px;
        }

        .footer {
            margin-top: 40px;
            color: var(--secondary-text);
            font-size: 0.9rem;
        }

        #temp-card {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(30, 41, 59, 0.7));
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>PC Monitor</h1>
        <p>Monitoramento em Tempo Real</p>
    </div>

    <div class="dashboard">
        <!-- CPU Card -->
        <div class="card">
            <h2>CPU <span>⚡</span></h2>
            <div class="metric-value" id="cpu-val">--<span class="metric-unit">%</span></div>
            <div class="chart-container">
                <canvas id="cpuChart"></canvas>
            </div>
        </div>

        <!-- Memory Card -->
        <div class="card">
            <h2>Memória <span>🧠</span></h2>
            <div class="metric-value" id="mem-val">--<span class="metric-unit">%</span></div>
            <div class="chart-container">
                <canvas id="memChart"></canvas>
            </div>
        </div>

        <!-- Network Card -->
        <div class="card">
            <h2>Rede <span>🌐</span></h2>
            <div id="net-val" style="font-size: 1.5rem; margin-top: 10px;">
                ↓ -- KB/s<br>
                ↑ -- KB/s
            </div>
            <div class="chart-container">
                <canvas id="netChart"></canvas>
            </div>
        </div>

        <!-- Temperature Card -->
        <div class="card" id="temp-card">
            <h2>Temperatura <span>🌡️</span></h2>
            <div class="metric-value" id="temp-val">--<span class="metric-unit">°C</span></div>
            <p style="font-size: 0.8rem; color: var(--secondary-text);">Sensor do Processador</p>
        </div>
    </div>

    <div class="footer">
        Atualizado pela Skill Monitor • <span id="last-update">--</span>
    </div>

    <script>
        const cpuData = [];
        const memData = [];
        const netDownData = [];
        const labels = Array(20).fill('');

        const chartConfig = (id, label, color) => ({
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: label,
                    data: [],
                    borderColor: color,
                    backgroundColor: color + '22',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#94a3b8', font: { size: 10 } }
                    }
                }
            }
        });

        const cpuChart = new Chart(document.getElementById('cpuChart'), chartConfig('cpu', 'CPU %', '#38bdf8'));
        const memChart = new Chart(document.getElementById('memChart'), chartConfig('mem', 'Memória %', '#a855f7'));
        const netChart = new Chart(document.getElementById('netChart'), chartConfig('net', 'KB/s', '#10b981'));

        async function updateMetrics() {
            try {
                // Remove existing script if any
                const existingScript = document.getElementById('metrics-script');
                if (existingScript) existingScript.remove();

                // Inject new script to load data (bypassing CORS)
                const script = document.createElement('script');
                script.id = 'metrics-script';
                script.src = 'metrics-data.js?t=' + Date.now();
                
                script.onload = () => {
                    const data = window.PC_METRICS;
                    if (!data) return;

                    // Update UI
                    document.getElementById('cpu-val').innerHTML = `${data.cpu.percentage}<span class="metric-unit">%</span>`;
                    document.getElementById('mem-val').innerHTML = `${data.memory.percentage}<span class="metric-unit">%</span>`;
                    
                    const downKB = (data.network.recv_bps / 1024).toFixed(1);
                    const upKB = (data.network.sent_bps / 1024).toFixed(1);
                    document.getElementById('net-val').innerHTML = `↓ ${downKB} KB/s<br>↑ ${upKB} KB/s`;
                    
                    const temp = data.cpu.temp;
                    document.getElementById('temp-val').innerHTML = temp ? `${temp.toFixed(1)}<span class="metric-unit">°C</span>` : `N/A`;

                    document.getElementById('last-update').innerText = new Date().toLocaleTimeString();

                    // Update Charts
                    const updateChart = (chart, val) => {
                        chart.data.datasets[0].data.push(val);
                        if (chart.data.datasets[0].data.length > 20) chart.data.datasets[0].data.shift();
                        chart.update('none');
                    };

                    updateChart(cpuChart, data.cpu.percentage);
                    updateChart(memChart, data.memory.percentage);
                    updateChart(netChart, parseFloat(downKB));
                };

                document.body.appendChild(script);

            } catch (e) {
                console.error("Erro ao carregar métricas:", e);
            }
        }

        // Poll for updates every 2 seconds
        setInterval(updateMetrics, 2000);
        updateMetrics();
    </script>
</body>
</html>
